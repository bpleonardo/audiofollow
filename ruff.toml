show-fixes = true
target-version = "py310"
output-format = "grouped"

[lint]
select = [
    "ANN",
    "ASYNC",
    "BLE",
    "FBT",
    "B",
    "C4",
    "FIX",
    "ICN",
    "G",
    "PIE",
    "RET",
    "SIM",
    "TCH",
    "FLY",
    "I",
    "C90",
    "PERF",
    "F",
    "RUF",

    "S1",
    "Q003",
    "W29",
    "W605",
    "E4",
    "E7",
    "E9",
]
ignore = ["S101", "SIM105", "RUF105"]
preview = true

[lint.flake8-quotes]
inline-quotes = "single"

[lint.flake8-type-checking]
quote-annotations = true
runtime-evaluated-decorators = ["dbus_fast.service.dbus_method"]

[lint.pydocstyle]
convention = "numpy"

[lint.isort]
length-sort = true
force-single-line = false

[format]
quote-style = "single"
docstring-code-format = true
